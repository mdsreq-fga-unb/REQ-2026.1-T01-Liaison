<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Liaison — voluntariado universitário, da vaga ao certificado">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a2744"/>
      <stop offset="1" stop-color="#0f1929"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8a463"/>
      <stop offset="1" stop-color="#d4813a"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="phone"><rect x="928" y="70" width="252" height="300" rx="30"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="420" rx="0" fill="url(#bg)"/>

  <!-- decorative arcs -->
  <g stroke="#d4813a" stroke-opacity="0.18" fill="none">
    <circle cx="1150" cy="60" r="220" stroke-width="1.5"/>
    <circle cx="1150" cy="60" r="320" stroke-width="1"/>
    <circle cx="120" cy="400" r="180" stroke-width="1"/>
  </g>
  <g fill="#d4813a" fill-opacity="0.35">
    <circle cx="930" cy="280" r="3"/>
    <circle cx="200" cy="90" r="2.5"/>
    <circle cx="60" cy="250" r="2"/>
    <circle cx="700" cy="360" r="2.5"/>
  </g>

  <!-- monogram tile -->
  <rect x="80" y="72" width="92" height="92" rx="22" fill="url(#gold)"/>
  <text x="126" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-style="italic" font-weight="700" fill="#1a2744" text-anchor="middle">L</text>

  <!-- wordmark -->
  <text x="80" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#faf8f4">Liaison</text>

  <!-- tagline -->
  <text x="84" y="300" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="25" fill="#c9cedb">Voluntariado universitário — da vaga ao</text>
  <text x="84" y="334" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="25" fill="#c9cedb">certificado digital <tspan fill="#e8a463" font-weight="600">verificável</tspan>.</text>

  <!-- status pill -->
  <g>
    <rect x="84" y="360" width="196" height="34" rx="17" fill="#d4813a" fill-opacity="0.14" stroke="#d4813a" stroke-opacity="0.4"/>
    <circle cx="106" cy="377" r="5" fill="#48d18a"/>
    <text x="120" y="382" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#e8a463">Em produção · PWA</text>
  </g>

  <!-- phone mockup -->
  <rect x="922" y="64" width="264" height="312" rx="34" fill="#0b1220" stroke="#2a3550" stroke-width="2"/>
  <g clip-path="url(#phone)">
    <rect x="928" y="70" width="252" height="300" fill="#faf8f4"/>
    <!-- app header -->
    <rect x="928" y="70" width="252" height="66" fill="#1a2744"/>
    <text x="948" y="112" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#e8a463">Oportunidades</text>
    <!-- card 1 -->
    <rect x="948" y="152" width="212" height="72" rx="12" fill="#ffffff" stroke="#ddd8ce"/>
    <rect x="962" y="166" width="44" height="44" rx="10" fill="#1d7a4a" fill-opacity="0.15"/>
    <circle cx="984" cy="188" r="12" fill="#1d7a4a" fill-opacity="0.55"/>
    <rect x="1018" y="170" width="120" height="12" rx="6" fill="#1a2744"/>
    <rect x="1018" y="190" width="86" height="9" rx="4.5" fill="#7a8299"/>
    <rect x="1018" y="205" width="58" height="9" rx="4.5" fill="#d4813a" fill-opacity="0.6"/>
    <!-- card 2 -->
    <rect x="948" y="234" width="212" height="72" rx="12" fill="#ffffff" stroke="#ddd8ce"/>
    <rect x="962" y="248" width="44" height="44" rx="10" fill="#1d5faa" fill-opacity="0.15"/>
    <circle cx="984" cy="270" r="12" fill="#1d5faa" fill-opacity="0.55"/>
    <rect x="1018" y="252" width="104" height="12" rx="6" fill="#1a2744"/>
    <rect x="1018" y="272" width="92" height="9" rx="4.5" fill="#7a8299"/>
    <rect x="1018" y="287" width="52" height="9" rx="4.5" fill="#d4813a" fill-opacity="0.6"/>
    <!-- CTA bar -->
    <rect x="948" y="320" width="212" height="34" rx="17" fill="url(#gold)"/>
    <rect x="1020" y="333" width="68" height="9" rx="4.5" fill="#1a2744" fill-opacity="0.85"/>
  </g>
  <!-- notch -->
  <rect x="1030" y="76" width="48" height="8" rx="4" fill="#2a3550"/>

  <!-- sheen -->
  <rect width="1280" height="140" fill="url(#fade)"/>
</svg>
