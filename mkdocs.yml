site_name: Liaison
site_url: https://mdsreq-fga-unb.github.io/REQ-2026.1-T01-Liaison/
site_description: Plataforma de Conexão entre Estudantes e Voluntariado

theme:
  name: material
  language: pt-BR
  logo: material/handshake # Um ícone legal para a plataforma (Liaison/Conexão)
  favicon: material/handshake
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mudar para modo escuro

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo claro

  features:
    # Removemos navigation.tabs para ter uma barra lateral unificada (estilo Docusaurus/Starlight)
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.footer
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list

nav:
  - Início: index.md
  - Visão do Produto e Projeto:
      - Cenário e Negócio: projeto/cenario.md
      - Solução Proposta: projeto/solucao.md
      - Intervenção Social: projeto/intervencao_social.md
      - Estratégias de Engenharia de Software: projeto/estrategias.md
      - Engenharia de Requisitos: projeto/requisitos.md
      - Cronograma e Entregas: projeto/cronograma.md
      - Interação entre Equipe e Cliente: projeto/interacao.md
      - Requisitos de Software: projeto/requisitos_software.md
      - Definição de Pronto e Aceito: projeto/DoR_DoD.md
      - Backlog do Produto: projeto/backlog_produto.md
      - Histórico de Melhorias: projeto/historico_de_melhorias.md
      - Rastreabilidade de Requisitos: projeto/rastreabilidade.md
      - Quadro de MVP (Evidências): projeto/mvp.md
      - Referências Bibliográficas: projeto/referencias.md
  - Lições Aprendidas:
      - Unidade 1: projeto/licoes/unidade1.md
      - Unidade 2: projeto/licoes/unidade2.md
      - Unidade 3: projeto/licoes/unidade3.md
  - Entregas:
      - Unidade 1: entregas/unidade1.md
      - Unidade 2: entregas/unidade2.md
      - Unidade 3: entregas/unidade3.md
  - Execução:
      - Evidencias de software: execucao/evidencias_esw.md
      - Evidencias de requisitos: execucao/evidencias_er.md
      - Atas de Reuniões:
          - Ata 01 - Elicitação (12/04): execucao/atas/ata_01_elicitaçao_valdemir_12_04.md
          - Ata 02 - Organização (02/05): execucao/atas/ata_02_organizacao_reqs_02_05.md
          - Ata 03 - Monitoria (12/05): execucao/atas/ata_03_monitoria_12_05.md
          - Ata 04 - Priorização (19/05): execucao/atas/ata_04_priorizacao_19_05.md
          - Ata 05 - Monitoria (19/05): execucao/atas/ata_05_monitoria_19_05.md
          - Ata 06 - Monitoria (26/05): execucao/atas/ata_06_monitoria_26_05.md
          - Ata 07 - Monitoria (02/06): execucao/atas/ata_07_monitoria_02_06.md
          - Ata 08 - Monitoria (09/06): execucao/atas/ata_08_monitoria_09_06.md
extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mdsreq-fga-unb/REQ-2026.1-T01-Liaison

plugins:
  - search
  - mkdocs-pdf
