site_name: Liaison
site_url: https://mdsreq-fga-unb.github.io/REQ-2026.1-T01-Liaison/
site_description: Plataforma de Conexão entre Estudantes e Voluntariado

theme:
  name: material
  language: pt-BR
  logo: material/handshake # Um ícone legal para a plataforma (Liaison/Conexão)
  favicon: material/handshake
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mudar para modo escuro

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo claro

  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list

nav:
  - Início: index.md
  - Visão do Produto e Projeto:
      - Cenário e Negócio: projeto/cenario.md
      - Solução Proposta: projeto/solucao.md
      - Intervenção Social: projeto/intervencao_social.md
      - Estratégias de Engenharia de Software: projeto/estrategias.md
      - Engenharia de Requisitos: projeto/requisitos.md
      - Cronograma e Entregas: projeto/cronograma.md
      - Interação entre Equipe e Cliente: projeto/interacao.md
      - Requisitos de Software: projeto/requisitos_software.md
      - Definição de Pronto e Aceito: projeto/DoR_DoD.md
      - Backlog do Produto: projeto/backlog_produto.md
      - Backlog Priorizado: projeto/backlog_priorizado.md
      - Regras de Negócio: projeto/regras_negocio.md
      - Histórico de Melhorias: projeto/historico_de_melhorias.md
      - Referências Bibliográficas: projeto/referencias.md
  - Organização e Planejamento:
      - Planejamento: organizacao_e_planejamento/planejamento.md
      - Rastreabilidade: organizacao_e_planejamento/rastreabilidade.md
      - MVP:
          - Matriz de Completude: organizacao_e_planejamento/MVP/index.md
          - US1.1: organizacao_e_planejamento/MVP/us1_1.md
          - US1.2: organizacao_e_planejamento/MVP/us1_2.md
          - US1.3: organizacao_e_planejamento/MVP/us1_3.md
          - US1.4: organizacao_e_planejamento/MVP/us1_4.md
          - US1.5: organizacao_e_planejamento/MVP/us1_5.md
          - US1.6: organizacao_e_planejamento/MVP/us1_6.md
          - US1.7: organizacao_e_planejamento/MVP/us1_7.md
          - US2.1: organizacao_e_planejamento/MVP/us2_1.md
          - US2.2: organizacao_e_planejamento/MVP/us2_2.md
          - US2.3: organizacao_e_planejamento/MVP/us2_3.md
          - US2.5: organizacao_e_planejamento/MVP/us2_5.md
          - US2.6: organizacao_e_planejamento/MVP/us2_6.md
          - US2.7: organizacao_e_planejamento/MVP/us2_7.md
          - US2.8: organizacao_e_planejamento/MVP/us2_8.md
          - US2.9: organizacao_e_planejamento/MVP/us2_9.md
          - US2.10: organizacao_e_planejamento/MVP/us2_10.md
          - US2.11: organizacao_e_planejamento/MVP/us2_11.md
          - US3.1: organizacao_e_planejamento/MVP/us3_1.md
          - US3.2: organizacao_e_planejamento/MVP/us3_2.md
          - US3.3: organizacao_e_planejamento/MVP/us3_3.md
          - US3.4: organizacao_e_planejamento/MVP/us3_4.md
  - Lições Aprendidas:
      - Unidade 1: projeto/licoes/unidade1.md
      - Unidade 2: projeto/licoes/unidade2.md
      - Unidade 3: projeto/licoes/unidade3.md
  - Entregas:
      - Unidade 1: entregas/unidade1.md
      - Unidade 2: entregas/unidade2.md
